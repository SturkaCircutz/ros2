launch:
  - node:
      pkg: "tutorial_pkg"
      exec: "my_first_node"
      name: "my_node"
      remap:
        - from: "/image"
          to: "/camera/color/image_raw"
      param:
        - name: "timer_period_s"
          value: 2
  - node:
      pkg: "image_view"
      exec: "image_saver"
      name: "image_saver"
      remap:
        - from: "/image"
          to: "/camera/color/image_raw"
        - from: "/camera_info"
          to: "/camera/color/camera_info"
      param:
        - name: "save_all_image"
          value: false
        - name: "filename_format"
          value: "./saved_images/image%04d.%s"
